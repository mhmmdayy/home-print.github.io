<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="ic-transparent.png" type="image/png">
    <title>Layanan Tutup Sementara - Home Print</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-dark {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        @keyframes pulse-slow {

            0%,
            100% {
                opacity: 0.4;
                transform: scale(1);
            }

            50% {
                opacity: 0.6;
                transform: scale(1.05);
            }
        }

        .animate-pulse-slow {
            animation: pulse-slow 6s infinite ease-in-out;
        }
    </style>
</head>

<body
    class="bg-slate-900 font-sans min-h-screen flex items-center justify-center p-4 sm:p-6 relative overflow-hidden select-none">

    <div
        class="absolute w-72 h-72 rounded-full bg-cyan-500/10 blur-[100px] -top-12 -left-12 pointer-events-none animate-pulse-slow">
    </div>
    <div class="absolute w-80 h-80 rounded-full bg-pink-500/10 blur-[120px] bottom-10 right-0 pointer-events-none animate-pulse-slow"
        style="animation-delay: 3s;"></div>
    <div class="absolute w-60 h-60 rounded-full bg-indigo-500/5 blur-[90px] top-1/3 left-1/3 pointer-events-none"></div>

    <div
        class="max-w-md w-full glass-dark rounded-[32px] shadow-[0_25px_50px_-12px_rgba(0,0,0,0.6)] p-8 text-center text-white relative z-10 border border-white/10">

        <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-tr from-cyan-500/20 to-pink-500/20 border border-white/10 mb-6 shadow-inner relative group animate-pulse"
            style="animation-duration: 3s;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="w-10 h-10 text-pink-400">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
            </svg>
        </div>

        <h1 class="text-2xl font-black tracking-tight mb-3">
            Layanan Tutup <span
                class="text-transparent bg-clip-text bg-gradient-to-r from-pink-400 via-purple-300 to-indigo-400">Sementara</span>
        </h1>

        <p class="text-xs sm:text-sm text-slate-400 leading-relaxed px-1 mb-6">
            Mohon maaf, saat ini sistem pemesanan dokumen dan pengerjaan file dinonaktifkan sampai waktu yang belum
            ditentukan karena admin sedang dalam masa <strong>persiapan sidang tugas akhir</strong>. Terima kasih banyak atas
            pengertiannya.
        </p>

        <div class="border-t border-white/5 my-4"></div>

        <p class="text-[10px] text-slate-500 tracking-wider uppercase mt-4">
            &copy; 2026 Home Print & Developer. All Rights Reserved.
        </p>
    </div>
</body>

</html>
