<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="ic-transparent.png" type="image/png">
    <title>Dashboard Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fadeIn {
            animation: fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
    </style>
</head>
<body class="bg-slate-900 font-sans min-h-screen p-4 pb-32 relative overflow-x-hidden">
    <div class="absolute w-72 h-72 rounded-full bg-cyan-500/10 blur-[80px] -top-12 -left-12 pointer-events-none"></div>
    <div class="absolute w-80 h-80 rounded-full bg-pink-500/10 blur-[100px] bottom-10 right-0 pointer-events-none">
    </div>
    <div class="absolute top-4 left-4 z-20">
        <a href="feedback-admin.html"
            class="text-xs font-extrabold text-white bg-gradient-to-r from-cyan-500 to-indigo-500 hover:brightness-110 transition-all duration-300 px-4 py-2.5 rounded-2xl tracking-wide shadow-md shadow-cyan-500/10 border border-cyan-400/20 block">
            Feedback
        </a>
    </div>
    <div class="absolute top-4 right-4 z-20">
        <button onclick="logout()"
            class="text-xs font-bold text-slate-300 hover:text-white hover:bg-white/10 transition-all duration-300 bg-white/5 backdrop-blur-md px-4 py-2.5 rounded-2xl border border-white/10 tracking-wide shadow-sm">
            Logout
        </button>
    </div>
    <div
        class="max-w-4xl mx-auto bg-white/[0.06] backdrop-blur-xl rounded-[32px] shadow-[0_25px_50px_-12px_rgba(0,0,0,0.5)] p-4 sm:p-8 mt-16 border border-white/10 relative z-10">
        <div class="mb-6 sm:mb-8 px-1">
            <h2 class="text-2xl sm:text-3xl font-black tracking-tight text-white">
                Manajemen <span
                    class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-pink-400 to-yellow-400">HomePrint</span>
            </h2>
            <p class="text-xs sm:text-sm text-slate-400 mt-1">
                Pantau dan kelola stok barang, kertas foto, serta kritik dan saran.
            </p>
        </div>
        <div class="flex gap-2 p-1.5 bg-white/5 rounded-2xl mb-6 sm:mb-8 border border-white/10">
            <button id="tabStokBtn" onclick="switchTab('stok')"
                class="flex-1 text-xs sm:text-sm font-extrabold py-3.5 px-2 rounded-xl transition-all duration-300 bg-white/10 text-white shadow-lg tracking-wide flex items-center justify-center gap-1.5">
                Barang & ATK
            </button>
            <button id="tabKertasBtn" onclick="switchTab('kertas')"
                class="flex-1 text-xs sm:text-sm font-extrabold py-3.5 px-2 rounded-xl transition-all duration-300 text-slate-400 hover:text-white tracking-wide flex items-center justify-center gap-1.5">
                Kertas Foto
            </button>
        </div>
        <div id="panelStok" class="space-y-2 animate-fadeIn">
            <div class="overflow-x-auto rounded-2xl border border-white/10 bg-white/5 w-full">
                <table class="w-full text-left border-collapse table-fixed min-w-[320px]">
                    <thead>
                        <tr class="border-b border-white/10">
                            <th
                                class="p-3 sm:p-4 text-[10px] sm:text-xs font-bold uppercase tracking-widest text-slate-400 w-12 text-center">
                                No
                            </th>
                            <th
                                class="p-3 sm:p-4 text-[10px] sm:text-xs font-bold uppercase tracking-widest text-slate-400 w-2/5">
                                Nama Barang
                            </th>
                            <th
                                class="p-3 sm:p-4 text-[10px] sm:text-xs font-bold uppercase tracking-widest text-slate-400 text-center w-20 sm:w-28">
                                Stok
                            </th>
                            <th
                                class="p-3 sm:p-4 text-[10px] sm:text-xs font-bold uppercase tracking-widest text-slate-400 w-24 sm:w-36">
                                Harga
                            </th>
                        </tr>
                    </thead>
                    <tbody id="stokTableBody" class="text-slate-200">
                        <tr>
                            <td colspan="4" class="p-12 text-center text-slate-500 font-medium text-sm">
                                Memuat data barang...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div id="panelKertas" class="space-y-2 hidden animate-fadeIn">
            <div class="overflow-x-auto rounded-2xl border border-white/10 bg-white/5 w-full">
                <table class="w-full text-left border-collapse table-fixed min-w-[320px]">
                    <thead>
                        <tr class="border-b border-white/10">
                            <th
                                class="p-4 text-[10px] sm:text-xs font-bold uppercase tracking-widest text-slate-400 w-16 text-center">
                                No</th>
                            <th class="p-4 text-[10px] sm:text-xs font-bold uppercase tracking-widest text-slate-400">
                                Nama Kertas Foto</th>
                        </tr>
                    </thead>
                    <tbody id="kertasTableBody" class="text-slate-200">
                        <tr>
                            <td colspan="2" class="p-12 text-center text-slate-500 font-medium text-sm">Memuat data
                                kertas foto...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div
        class="fixed bottom-0 left-0 right-0 flex justify-center bg-gradient-to-t from-slate-900 via-slate-900/80 to-transparent p-4 pb-6 sm:pb-8 z-50 backdrop-blur-sm">
        <button id="mainActionButton" onclick="tambahDataAction()"
            class="w-full max-w-md bg-gradient-to-r from-cyan-500 via-indigo-500 to-pink-500 hover:brightness-110 text-white font-extrabold py-3.5 sm:py-4 px-6 rounded-2xl shadow-[0_12px_30px_rgba(6,182,212,0.3)] text-center transform active:scale-[0.97] transition-all duration-200 text-sm sm:text-base tracking-wider border border-white/10">
            Tambah Stok Barang
        </button>
    </div>
    
    <script type="module">
        // Cek apakah user datang lewat jalur login resmi
        if (sessionStorage.getItem('isLoggedIn') !== 'true') {
            alert('Akses ditolak! Silakan login terlebih dahulu.');
            window.location.href = "login.html";
        }
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, onValue, remove, update, set } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
        const firebaseConfig = {
            apiKey: "AIzaSyBO_jWfltM8J9obdA5Vio50kPtOqkDuDlw",
            authDomain: "home-print-8437d.firebaseapp.com",
            databaseURL: "https://home-print-8437d-default-rtdb.firebaseio.com",
            projectId: "home-print-8437d",
            storageBucket: "home-print-8437d.firebasestorage.app",
            messagingSenderId: "418956397903",
            appId: "1:418956397903:web:cb17eaeab729790f23093a",
            measurementId: "G-ZHRM0PKS2D"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let activeTab = 'stok';
        let listKertasExisting = [];
        window.switchTab = (tabName) => {
            activeTab = tabName;
            const tabStok = document.getElementById('tabStokBtn');
            const tabKertas = document.getElementById('tabKertasBtn');
            const panelStok = document.getElementById('panelStok');
            const panelKertas = document.getElementById('panelKertas');
            const actionBtn = document.getElementById('mainActionButton');
            if (tabName === 'stok') {
                tabStok.className = "flex-1 text-xs sm:text-sm font-extrabold py-3.5 px-2 rounded-xl transition-all duration-300 bg-white/10 text-white shadow-lg";
                tabKertas.className = "flex-1 text-xs sm:text-sm font-extrabold py-3.5 px-2 rounded-xl transition-all duration-300 text-slate-400 hover:text-white";
                panelStok.classList.remove('hidden'); 
                panelKertas.classList.add('hidden');
                actionBtn.innerText = "Tambah Stok Barang";
            } else {
                tabKertas.className = "flex-1 text-xs sm:text-sm font-extrabold py-3.5 px-2 rounded-xl transition-all duration-300 bg-white/10 text-white shadow-lg";
                tabStok.className = "flex-1 text-xs sm:text-sm font-extrabold py-3.5 px-2 rounded-xl transition-all duration-300 text-slate-400 hover:text-white";
                panelKertas.classList.remove('hidden'); 
                panelStok.classList.add('hidden');
                actionBtn.innerText = "Tambah Varian Kertas Foto";
            }
        };
        window.tambahDataAction = () => {
            if (activeTab === 'stok') {
                window.location.href = "add_stok.html";
            } else {
                const namaKertasBaru = prompt("Masukkan Nama Kertas Foto Baru:");
                if (!namaKertasBaru || namaKertasBaru.trim() === "") return;
                let maxIndex = 0;
                listKertasExisting.forEach(key => {
                    const match = key.match(/\d+/);
                    if (match) {
                        const num = parseInt(match[0]);
                        if (num > maxIndex) maxIndex = num;
                    }
                });
                const nextIndex = maxIndex + 1;
                const nodeName = `paper${nextIndex}`;
                set(ref(db, `foto_paper/${nodeName}`), {
                    nama_paper: namaKertasBaru.trim()
                })
                    .then(() => alert(`Varian kertas "${namaKertasBaru}" sukses dimasukkan sebagai ${nodeName}!`))
                    .catch(err => alert("Gagal menyimpan data: " + err.message));
            }
        };
        const stokRef = ref(db, 'stok');
        onValue(stokRef, (snapshot) => {
            const tbody = document.getElementById('stokTableBody');
            tbody.innerHTML = '';
            if (snapshot.exists()) {
                const data = snapshot.val();
                let index = 1;
                for (let id in data) {
                    const item = data[id];
                    const row = `
                        <tr onclick="toggleActionRow('stok-${id}')" class="border-b border-white/5 hover:bg-white/5 transition cursor-pointer">
                            <td class="p-3 sm:p-4 text-xs font-semibold text-slate-400 text-center">${index++}</td>
                            <td class="p-3 sm:p-4 text-xs sm:text-sm font-bold text-white break-words">${item.nama_stok}</td>
                            <td class="p-3 sm:p-4 text-xs sm:text-sm text-center"><span class="bg-cyan-500/10 text-cyan-400 px-2 sm:px-3 py-1 rounded-lg border border-cyan-500/20">${item.sisa_stok}</span></td>
                            <td class="p-3 sm:p-4 text-xs sm:text-sm text-slate-300 font-bold truncate">Rp ${parseInt(item.harga).toLocaleString('id-ID')}</td>
                        </tr>
                        <tr id="action-stok-${id}" class="hidden bg-white/5 border-b border-white/5 animate-fadeIn">
                            <td colspan="4" class="p-3 text-right">
                                <div class="flex justify-end gap-2 sm:gap-3 px-1">
                                    <button onclick="event.stopPropagation(); updateStok('${id}', '${item.nama_stok}', ${item.sisa_stok}, ${item.harga})" class="bg-amber-500/10 text-amber-400 border border-amber-500/20 px-3 py-1.5 rounded-lg text-xs font-bold">Ubah</button>
                                    <button onclick="event.stopPropagation(); deleteStok('${id}')" class="bg-red-500/10 text-red-400 border border-red-500/20 px-3 py-1.5 rounded-lg text-xs font-bold">Hapus</button>
                                </div>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                }
            } else {
                tbody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-slate-400 font-medium">Belum ada data stok barang.</td></tr>';
            }
        });
        const kertasRef = ref(db, 'foto_paper');
        onValue(kertasRef, (snapshot) => {
            const tbody = document.getElementById('kertasTableBody');
            tbody.innerHTML = '';
            listKertasExisting = [];
            if (snapshot.exists()) {
                const data = snapshot.val();
                let index = 1;
                listKertasExisting = Object.keys(data);
                for (let paperId in data) {
                    const item = data[paperId];
                    const row = `
                        <tr onclick="toggleActionRow('kertas-${paperId}')" class="border-b border-white/5 hover:bg-white/5 transition cursor-pointer">
                            <td class="p-4 text-xs font-semibold text-slate-400 text-center w-16">${index++}</td>
                            <td class="p-4 text-sm font-bold text-white flex justify-between">${item.nama_paper}</td>
                        </tr>
                        <tr id="action-kertas-${paperId}" class="hidden bg-white/5 border-b border-white/5 animate-fadeIn">
                            <td colspan="2" class="p-3 text-right">
                                <button onclick="event.stopPropagation(); updateKertas('${paperId}', '${item.nama_paper}')" class="bg-amber-500/10 text-amber-400 border border-amber-200/50 px-3 py-1.5 rounded-lg text-xs font-bold mx-2">Ubah</button>
                                <button onclick="event.stopPropagation(); deleteKertas('${paperId}')" class="bg-red-500/10 text-red-400 border border-red-200/50 px-3 py-1.5 rounded-lg text-xs font-bold">Hapus</button>
                            </td>
                        </tr>`;
                    tbody.innerHTML += row;
                }
            } else {
                tbody.innerHTML = '<tr><td colspan="2" class="p-10 text-center text-slate-400 font-medium">Belum ada varian kertas foto.</td></tr>';
            }
        });
        window.toggleActionRow = (customId) => {
            const targetRow = document.getElementById(`action-${customId}`);
            document.querySelectorAll('[id^="action-"]').forEach(row => {
                if (row.id !== `action-${customId}`) row.classList.add('hidden');
            });
            targetRow.classList.toggle('hidden');
        };
        window.deleteStok = (id) => {
            if (confirm("Apakah Anda yakin ingin menghapus barang ini dari database?")) {
                remove(ref(db, 'stok/' + id)).then(() => alert("Barang sukses terhapus!"));
            }
        };
        window.updateStok = (id, currentNama, currentStok, currentHarga) => {
            const newNama = prompt("Edit Nama Barang:", currentNama); if (newNama === null) return;
            const newStok = prompt("Edit Sisa Stok:", currentStok); if (newStok === null) return;
            const newHarga = prompt("Edit Harga (angka saja):", currentHarga); if (newHarga === null) return;
            const updates = {};
            updates['stok/' + id] = { nama_stok: newNama.trim(), sisa_stok: parseInt(newStok), harga: parseInt(newHarga) };
            update(ref(db), updates).then(() => alert("Data barang diperbarui!"));
        };
        window.deleteKertas = (paperId) => {
            if (confirm(`Apakah Anda yakin ingin menghapus varian kertas ${paperId}?`)) {
                remove(ref(db, 'foto_paper/' + paperId)).then(() => alert("Kertas foto berhasil dihapus!"));
            }
        };
        window.updateKertas = (paperId, currentNamaPaper) => {
            const newNamaPaper = prompt("Edit Nama Jenis Kertas Foto:", currentNamaPaper);
            if (!newNamaPaper || newNamaPaper.trim() === "") return;
            const updates = {};
            updates[`foto_paper/${paperId}`] = { nama_paper: newNamaPaper.trim() };
            update(ref(db), updates).then(() => alert("Varian kertas foto diperbarui!"));
        };
        window.logout = () => {
            if (confirm("Apakah Anda yakin ingin keluar dari halaman dasbor?")) { 
                sessionStorage.removeItem('isLoggedIn');
                window.location.href = "index.html"; 
            }
        };
    </script>
</body>
</html>
