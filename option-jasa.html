<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="ic-transparent.png" type="image/png">
    <title>Pilih Layanan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-dark {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-slate-900 font-sans min-h-screen flex items-center justify-center p-4 relative overflow-x-hidden">
    <div class="absolute w-72 h-72 rounded-full bg-cyan-500/10 blur-[80px] -top-12 -left-12 pointer-events-none"></div>
    <div class="absolute w-80 h-80 rounded-full bg-pink-500/10 blur-[100px] bottom-10 right-0 pointer-events-none">
    </div>
    <div class="max-w-md w-full glass-dark rounded-[32px] shadow-[0_25px_50px_-12px_rgba(0,0,0,0.5)] p-6 sm:p-8 text-white relative z-10">
        <div class="text-center mb-6 border-b border-white/10 pb-4">
            <h2 class="text-2xl font-black tracking-tight text-white">
                Pilih <span
                    class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-pink-400">Layanan</span>
            </h2>
            <p class="text-xs text-slate-400 mt-1">Silakan pilih jenis layanan yang Anda perlukan</p>
        </div>
        <form id="serviceForm" class="space-y-4">
            <div class="space-y-3">
                <label
                    class="flex items-center justify-between p-4 rounded-xl bg-white/5 border border-white/10 hover:border-cyan-500/40 hover:bg-white/[0.08] cursor-pointer transition duration-200 group group-has-[:checked]:border-cyan-500">
                    <div class="flex items-center gap-3">
                        <div class="flex flex-col">
                            <span
                                class="text-sm font-bold text-slate-200 group-hover:text-white transition">Percetakan</span>
                            <span class="text-xs text-slate-400">Print, fotocopy, dan cetak foto</span>
                        </div>
                    </div>
                    <input type="radio" name="layanan" value="pesan.html" checked
                        class="w-4 h-4 text-cyan-500 bg-slate-800 border-white/10 focus:ring-cyan-500 focus:ring-offset-slate-900 accent-cyan-400">
                </label>
                <label
                    class="flex items-center justify-between p-4 rounded-xl bg-white/5 border border-white/10 hover:border-pink-500/40 hover:bg-white/[0.08] cursor-pointer transition duration-200 group group-has-[:checked]:border-pink-500">
                    <div class="flex items-center gap-3">
                        <div class="flex flex-col">
                            <span class="text-sm font-bold text-slate-200 group-hover:text-white transition">Jasa Lainnya</span>
                            <span class="text-xs text-slate-400">Cv, surat lamaran kerja, jasa ketik, dan perbaikan file akibat PDF to WORD</span>
                        </div>
                    </div>
                    <input type="radio" name="layanan" value="jasa.html"
                        class="w-4 h-4 text-pink-500 bg-slate-800 border-white/10 focus:ring-pink-500 focus:ring-offset-slate-900 accent-pink-400">
                </label>
            </div>
            <button type="submit"
                class="w-full bg-gradient-to-r from-cyan-500 via-indigo-500 to-pink-500 hover:brightness-110 text-white font-black py-3.5 px-4 rounded-xl mt-4 shadow-[0_12px_30px_rgba(6,182,212,0.3)] border border-white/10 transition transform active:scale-95 text-sm tracking-wider uppercase">
                Pilih & Lanjutkan
            </button>
        </form>
    </div>
    <script>
        const navigationEntry = performance.getEntriesByType("navigation")[0];
        if (navigationEntry && navigationEntry.type === "reload") {
            window.location.href = "index.html";
        }
        document.getElementById('serviceForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const halamanTujuan = document.querySelector('input[name="layanan"]:checked').value;
            window.location.href = halamanTujuan;
        });
    </script>
</body>
</html>
