<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="ic-transparent.png" type="image/png">
    <title>Admin Feedback</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fadeIn {
            animation: fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
    </style>
</head>
<body class="bg-slate-900 font-sans min-h-screen flex flex-col items-center p-4 sm:p-6 relative overflow-x-hidden">
    <div class="absolute w-80 h-80 rounded-full bg-indigo-500/10 blur-[100px] top-10 left-10 pointer-events-none"></div>
    <div class="absolute w-80 h-80 rounded-full bg-pink-500/10 blur-[100px] bottom-10 right-10 pointer-events-none">
    </div>
    <div
        class="max-w-2xl w-full bg-white/[0.06] backdrop-blur-xl rounded-[32px] shadow-[0_25px_50px_-12px_rgba(0,0,0,0.5)] p-5 sm:p-8 border border-white/10 relative z-10 text-white my-6">
        <div class="mb-6 flex flex-col sm:flex-row sm:items-center justify-between border-b border-white/10 pb-4 gap-4">
            <div>
                <h2 class="text-2xl font-black tracking-tight text-white flex items-center gap-2">
                    Manajemen 
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-pink-400 to-yellow-400">
                        Feedback
                    </span>
                </h2>
                <p class="text-xs text-slate-400 mt-1">
                    Pantau dan kelola kritik serta saran dari pelanggan.
                </p>
            </div>
            <a href="index-admin.html"
                class="text-xs font-bold text-slate-300 hover:text-white bg-white/5 hover:bg-white/10 border border-white/10 px-4 py-2 rounded-xl transition text-center sm:self-center">
                Kembali
            </a>
        </div>
        <div id="adminNotif"
            class="hidden mb-4 p-3 text-sm rounded-xl border font-semibold tracking-wide shadow-sm animate-fadeIn">
        </div>
        <div id="loadingState" class="py-12 text-center text-slate-400 font-medium">
            <svg class="animate-spin h-6 w-6 text-cyan-400 mx-auto mb-2" xmlns="http://www.w3.org/2000/svg" fill="none"
                viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                </path>
            </svg>
            Memuat data masukan...
        </div>
        <div id="feedbackListContainer" class="space-y-3.5 hidden">
        </div>
        <div id="paginationContainer"
            class="mt-8 pt-4 border-t border-white/10 flex flex-col sm:flex-row items-center justify-between gap-4 hidden">
            <span id="pageInfo" class="text-xs font-bold text-slate-400 tracking-wide uppercase">
                Halaman 1 dari 1
            </span>
            <div class="flex items-center gap-3 w-full sm:w-auto">
                <button id="btnPrev" disabled
                    class="flex-1 sm:flex-none text-xs font-bold px-4 py-2.5 bg-white/5 border border-white/10 disabled:opacity-30 disabled:hover:bg-white/5 disabled:cursor-not-allowed rounded-xl hover:bg-white/10 transition text-slate-300">
                    Previous
                </button>
                <button id="btnNext" disabled
                    class="flex-1 sm:flex-none text-xs font-bold px-4 py-2.5 bg-white/5 border border-white/10 disabled:opacity-30 disabled:hover:bg-white/5 disabled:cursor-not-allowed rounded-xl hover:bg-white/10 transition text-slate-300">
                    Next
                </button>
            </div>
        </div>
    </div>
    <script type="module">
        // Cek apakah user datang lewat jalur login resmi
        if (sessionStorage.getItem('isLoggedIn') !== 'true') {
            alert('Akses ditolak! Silakan login terlebih dahulu.');
            window.location.href = "login.html";
        }
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, get, remove } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
        const firebaseConfig = {
            apiKey: "AIzaSyBO_jWfltM8J9obdA5Vio50kPtOqkDuDlw",
            authDomain: "home-print-8437d.firebaseapp.com",
            databaseURL: "https://home-print-8437d-default-rtdb.firebaseio.com",
            projectId: "home-print-8437d",
            storageBucket: "home-print-8437d.firebasestorage.app",
            messagingSenderId: "418956397903",
            appId: "1:418956397903:web:cb17eaeab729790f23093a",
            measurementId: "G-ZHRM0PKS2D"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const navigationEntry = performance.getEntriesByType("navigation")[0];
        if (navigationEntry && navigationEntry.type === "reload") {
            window.location.href = "index-admin.html";
        }
        let allFeedbackArray = [];
        let activeFeedbackKey = null;

        let currentPage = 1;
        const itemsPerPage = 10;
        async function loadAllData() {
            const listContainer = document.getElementById('feedbackListContainer');
            const pagContainer = document.getElementById('paginationContainer');
            const loadingState = document.getElementById('loadingState');
            try {
                const snapshot = await get(ref(db, 'feedback'));
                allFeedbackArray = [];
                activeFeedbackKey = null;
                if (snapshot.exists()) {
                    const dataRaw = snapshot.val();
                    Object.keys(dataRaw).forEach(key => {
                        allFeedbackArray.push({
                            id: key,
                            ...dataRaw[key]
                        });
                    });
                    allFeedbackArray.sort((a, b) => {
                        const numA = parseInt(a.id.replace('feedback', '')) || 0;
                        const numB = parseInt(b.id.replace('feedback', '')) || 0;
                        return numB - numA;
                    });
                }
                loadingState.classList.add('hidden');
                if (allFeedbackArray.length === 0) {
                    listContainer.innerHTML = `<div class="py-10 text-center text-slate-500 font-medium text-sm">Belum ada kritik atau saran yang masuk dari pelanggan.</div>`;
                    listContainer.classList.remove('hidden');
                    pagContainer.classList.add('hidden');
                    return;
                }
                listContainer.classList.remove('hidden');
                pagContainer.classList.remove('hidden');
                renderPage(currentPage);
            } catch (error) {
                console.error("Fetch Error: ", error);
                loadingState.innerHTML = `<div class="text-red-400 font-semibold text-sm">Gagal memuat data: ${error.message}</div>`;
            }
        }
        function renderPage(page) {
            const listContainer = document.getElementById('feedbackListContainer');
            listContainer.innerHTML = '';
            const startIndex = (page - 1) * itemsPerPage;
            const endIndex = Math.min(startIndex + itemsPerPage, allFeedbackArray.length);
            const totalPages = Math.ceil(allFeedbackArray.length / itemsPerPage);
            const pageItems = allFeedbackArray.slice(startIndex, endIndex);
            pageItems.forEach(item => {
                const isSelected = (activeFeedbackKey === item.id);
                const rowDiv = document.createElement('div');
                rowDiv.className = `p-4 rounded-2xl border transition-all duration-200 cursor-pointer flex items-center justify-between gap-4 ${isSelected
                        ? 'bg-indigo-500/10 border-indigo-500/40 shadow-[0_4px_20px_rgba(99,102,241,0.15)]'
                        : 'bg-white/[0.03] border-white/5 hover:border-white/20 hover:bg-white/[0.05]'
                    }`;
                rowDiv.addEventListener('click', () => {
                    activeFeedbackKey = (activeFeedbackKey === item.id) ? null : item.id;
                    renderPage(currentPage);
                });
                const contentWrapper = document.createElement('div');
                contentWrapper.className = "flex-1 min-w-0";
                contentWrapper.innerHTML = `
                    <div class="text-sm font-bold text-slate-200 tracking-wide truncate">
                        ${item.nama || 'Anonim'}, <span class="text-cyan-400 font-medium">${item.hp || '-'}</span>
                    </div>
                    <div class="text-xs text-slate-400 italic mt-1.5 break-words leading-relaxed pl-1">
                        "${item.pesan || ''}"
                    </div>
                `;
                rowDiv.appendChild(contentWrapper);
                if (isSelected) {
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = "text-xs font-black bg-gradient-to-r from-red-500 to-pink-600 hover:brightness-110 text-white px-3.5 py-2 rounded-xl border border-red-400/20 shadow-md shadow-red-500/10 transition transform active:scale-95 shrink-0 animate-fadeIn";
                    deleteBtn.innerText = "Hapus";
                    deleteBtn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        if (confirm(`Hapus masukan dari ${item.nama}?`)) {
                            await deleteFeedback(item.id);
                        }
                    });
                    rowDiv.appendChild(deleteBtn);
                }
                listContainer.appendChild(rowDiv);
            });
            document.getElementById('pageInfo').innerText = `Halaman ${page} dari ${totalPages}`;
            document.getElementById('btnPrev').disabled = (page === 1);
            document.getElementById('btnNext').disabled = (page === totalPages || totalPages === 0);
        }
        async function deleteFeedback(nodeKey) {
            const notif = document.getElementById('adminNotif');
            try {
                await remove(ref(db, `feedback/${nodeKey}`));
                notif.innerText = `Data berhasil dihapus dari sistem!`;
                notif.className = "mb-4 p-3 text-xs sm:text-sm rounded-xl border bg-emerald-500/10 text-emerald-400 border-emerald-500/20 font-semibold tracking-wide shadow-sm block animate-fadeIn";
                const totalPagesBefore = Math.ceil(allFeedbackArray.length / itemsPerPage);
                allFeedbackArray = allFeedbackArray.filter(i => i.id !== nodeKey);
                const totalPagesAfter = Math.ceil(allFeedbackArray.length / itemsPerPage);
                if (currentPage > totalPagesAfter && currentPage > 1) {
                    currentPage = totalPagesAfter;
                }
                activeFeedbackKey = null;
                if (allFeedbackArray.length === 0) {
                    document.getElementById('feedbackListContainer').innerHTML = `<div class="py-10 text-center text-slate-500 font-medium text-sm">Belum ada kritik atau saran yang masuk dari pelanggan.</div>`;
                    document.getElementById('paginationContainer').classList.add('hidden');
                } else {
                    renderPage(currentPage);
                }
                setTimeout(() => { notif.classList.add('hidden'); }, 3000);
            } catch (error) {
                console.error("Delete Error: ", error);
                notif.innerText = `Gagal menghapus data: ${error.message}`;
                notif.className = "mb-4 p-3 text-xs sm:text-sm rounded-xl border bg-red-500/10 text-red-400 border-red-500/20 font-semibold tracking-wide shadow-sm block animate-fadeIn";
            }
        }
        document.getElementById('btnPrev').addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                activeFeedbackKey = null;
                renderPage(currentPage);
            }
        });
        document.getElementById('btnNext').addEventListener('click', () => {
            const totalPages = Math.ceil(allFeedbackArray.length / itemsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                activeFeedbackKey = null;
                renderPage(currentPage);
            }
        });
        window.addEventListener('DOMContentLoaded', loadAllData);
    </script>
</body>
</html>
