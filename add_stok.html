<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="ic-transparent.png" type="image/png">
    <title>Tambah Stok</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fadeIn {
            animation: fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
    </style>
</head>
<body
    class="bg-slate-900 font-sans min-h-screen flex flex-col justify-center items-center p-4 relative overflow-hidden">
    <div class="absolute w-72 h-72 rounded-full bg-cyan-500/10 blur-[80px] -top-12 -left-12 pointer-events-none"></div>
    <div class="absolute w-80 h-80 rounded-full bg-pink-500/10 blur-[100px] bottom-10 right-0 pointer-events-none">
    </div>
    <div
        class="max-w-md w-full bg-white/[0.06] backdrop-blur-xl rounded-[32px] shadow-[0_25px_50px_-12px_rgba(0,0,0,0.5)] p-6 sm:p-8 relative border border-white/10 animate-fadeIn z-10">
        <div class="mb-6 flex items-center border-b border-white/10 pb-4">
            <a href="index-admin.html"
                class="text-cyan-400 hover:text-white font-bold text-sm flex items-center gap-1.5 transition duration-200 group">
                Kembali
            </a>
            <h2 class="text-xl font-black text-white mx-auto pr-14 tracking-tight">Tambah Stok</h2>
        </div>
        <div id="notification"
            class="hidden mb-5 p-3.5 text-xs sm:text-sm rounded-xl border font-semibold tracking-wide shadow-sm"></div>
        <form id="addStokForm" class="space-y-5">
            <div>
                <label
                    class="flex items-center gap-1.5 text-xs font-bold uppercase tracking-wider text-slate-400 mb-1.5">
                    Nama Barang
                </label>
                <input type="text" id="namaStok" required
                    class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyan-500/50 transition-all text-sm font-medium text-white placeholder-slate-600"
                    placeholder="Contoh: Kertas HVS A4">
            </div>
            <div>
                <label
                    class="flex items-center gap-1.5 text-xs font-bold uppercase tracking-wider text-slate-400 mb-1.5">
                    Stok
                </label>
                <input type="number" id="sisaStok" required min="0"
                    class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyan-500/50 transition-all text-sm font-medium text-white placeholder-slate-600"
                    placeholder="Contoh: 500">
            </div>
            <div>
                <label
                    class="flex items-center gap-1.5 text-xs font-bold uppercase tracking-wider text-slate-400 mb-1.5">
                    Harga Satuan (Rp)
                </label>
                <input type="number" id="harga" required min="0"
                    class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyan-500/50 transition-all text-sm font-medium text-white placeholder-slate-600"
                    placeholder="Contoh: 300">
            </div>
            <button type="submit" id="btnSimpan"
                class="w-full bg-gradient-to-r from-cyan-500 via-indigo-500 to-pink-500 hover:brightness-110 text-white font-extrabold py-3.5 px-4 rounded-xl mt-6 shadow-[0_12px_30px_rgba(6,182,212,0.3)] text-center transform active:scale-[0.97] transition-all duration-200 text-sm tracking-wide border border-white/10 flex items-center justify-center">
                Simpan Data Stok
            </button>
        </form>
    </div>
    <script type="module">
        // Cek apakah user datang lewat jalur login resmi
        if (sessionStorage.getItem('isLoggedIn') !== 'true') {
            alert('Akses ditolak! Silakan login terlebih dahulu.');
            window.location.href = "login.html";
        }
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, get, set, child } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
        const firebaseConfig = {
            apiKey: "AIzaSyBO_jWfltM8J9obdA5Vio50kPtOqkDuDlw",
            authDomain: "home-print-8437d.firebaseapp.com",
            databaseURL: "https://home-print-8437d-default-rtdb.firebaseio.com",
            projectId: "home-print-8437d",
            storageBucket: "home-print-8437d.firebasestorage.app",
            messagingSenderId: "418956397903",
            appId: "1:418956397903:web:cb17eaeab729790f23093a",
            measurementId: "G-ZHRM0PKS2D"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const navigationEntry = performance.getEntriesByType("navigation")[0];
        if (navigationEntry && navigationEntry.type === "reload") {
            window.location.href = "index-admin.html";
        }    
        document.getElementById('addStokForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const namaInput = document.getElementById('namaStok').value.trim();
            const stokInput = document.getElementById('sisaStok').value;
            const hargaInput = document.getElementById('harga').value;
            const notifDiv = document.getElementById('notification');
            const btnSimpan = document.getElementById('btnSimpan');
            notifDiv.className = "hidden";
            btnSimpan.disabled = true;
            btnSimpan.innerText = 'Menyimpan...';
            try {
                const snapshot = await get(child(ref(db), 'stok'));
                let nextIndex = 1;
                if (snapshot.exists()) {
                    const keys = Object.keys(snapshot.val());
                    keys.forEach(key => {
                        if (key.startsWith('barang')) {
                            const num = parseInt(key.replace('barang', ''));
                            if (!isNaN(num) && num >= nextIndex) nextIndex = num + 1;
                        }
                    });
                }
                await set(ref(db, 'stok/barang' + nextIndex), {
                    nama_stok: namaInput,
                    sisa_stok: parseInt(stokInput),
                    harga: parseInt(hargaInput)
                });
                notifDiv.innerText = `Berhasil disimpan!`;
                notifDiv.className = "mb-5 p-3.5 text-xs sm:text-sm rounded-xl border bg-emerald-500/10 text-emerald-400 border-emerald-500/20 font-semibold tracking-wide shadow-sm block";
                document.getElementById('addStokForm').reset();
                setTimeout(() => { window.location.href = "index-admin.html"; }, 1500);
            } catch (error) {
                notifDiv.innerText = 'Gagal menyimpan: ' + error.message;
                notifDiv.className = "mb-5 p-3.5 text-xs sm:text-sm rounded-xl border bg-red-500/10 text-red-400 border-red-500/20 font-semibold tracking-wide shadow-sm block";
                btnSimpan.disabled = false;
                btnSimpan.innerText = 'Simpan Data Stok';
            }
        });
    </script>
</body>
</html>
