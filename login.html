<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="ic-transparent.png" type="image/png">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fadeIn {
            animation: fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
    </style>
</head>
<body
    class="bg-slate-900 font-sans min-h-screen flex flex-col justify-center items-center p-4 relative overflow-hidden">
    <div class="absolute w-72 h-72 rounded-full bg-cyan-500/20 blur-[80px] -top-12 -left-12 pointer-events-none"></div>
    <div class="absolute w-80 h-80 rounded-full bg-pink-500/15 blur-[100px] bottom-10 right-0 pointer-events-none">
    </div>
    <div
        class="max-w-md w-full bg-white/[0.06] backdrop-blur-xl rounded-[32px] shadow-[0_25px_50px_-12px_rgba(0,0,0,0.5)] p-6 sm:p-8 relative border border-white/10 animate-fadeIn z-10">
        <div class="mb-6 flex items-center border-b border-white/10 pb-4">
            <a href="index.html"
                class="text-cyan-400 hover:text-white font-bold text-sm flex items-center gap-1.5 transition duration-200 group">
                Kembali
            </a>
            <h2 class="text-xl font-black text-white mx-auto pr-14 tracking-tight">Login Admin</h2>
        </div>
        <div id="errorNotification"
            class="hidden mb-5 p-3.5 text-xs sm:text-sm rounded-xl border bg-red-500/10 text-red-400 border-red-500/20 font-semibold tracking-wide shadow-sm">
        </div>
        <form id="loginForm" class="space-y-5">
            <div>
                <label
                    class="flex items-center gap-1.5 text-xs font-bold uppercase tracking-wider text-slate-300 mb-1.5">
                    Username
                </label>
                <input type="text" id="username" required
                    class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyan-500/50 transition-all text-sm font-medium text-white placeholder-slate-600"
                    placeholder="Masukkan username">
            </div>
            <div>
                <label
                    class="flex items-center gap-1.5 text-xs font-bold uppercase tracking-wider text-slate-300 mb-1.5">
                    Password
                </label>
                <input type="password" id="password" required
                    class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyan-500/50 transition-all text-sm font-medium text-white placeholder-slate-600"
                    placeholder="Masukkan password">
            </div>
            <button type="submit" id="btnLogin"
                class="w-full bg-gradient-to-r from-cyan-500 via-indigo-500 to-pink-500 hover:brightness-110 text-white font-extrabold py-3.5 px-4 rounded-xl mt-6 shadow-[0_12px_30px_rgba(6,182,212,0.3)] text-center transform active:scale-[0.97] transition-all duration-200 text-sm tracking-wide border border-white/10 flex items-center justify-center">
                Masuk
            </button>
        </form>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
        const firebaseConfig = {
            apiKey: "AIzaSyBO_jWfltM8J9obdA5Vio50kPtOqkDuDlw",
            authDomain: "home-print-8437d.firebaseapp.com",
            databaseURL: "https://home-print-8437d-default-rtdb.firebaseio.com",
            projectId: "home-print-8437d",
            storageBucket: "home-print-8437d.firebasestorage.app",
            messagingSenderId: "418956397903",
            appId: "1:418956397903:web:cb17eaeab729790f23093a",
            measurementId: "G-ZHRM0PKS2D"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const navigationEntry = performance.getEntriesByType("navigation")[0];
        if (navigationEntry && navigationEntry.type === "reload") {
            window.location.href = "index.html";
        }

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorNotification');
            const btnLogin = document.getElementById('btnLogin');
            btnLogin.disabled = true;
            btnLogin.innerText = 'Memeriksa...';
            try {
                const snapshot = await get(child(ref(db), 'users'));
                if (snapshot.exists() && snapshot.val().username === usernameInput && snapshot.val().password === passwordInput) {
                    sessionStorage.setItem('isLoggedIn', 'true');
                    window.location.href = "index-admin.html";
                } else {
                    errorDiv.innerText = 'Username atau Password salah!';
                    errorDiv.classList.remove('hidden');
                    btnLogin.disabled = false;
                    btnLogin.innerText = 'Masuk ke Dashboard';
                }
            } catch (error) {
                errorDiv.innerText = 'Kesalahan koneksi database.';
                errorDiv.classList.remove('hidden');
                btnLogin.disabled = false;
                btnLogin.innerText = 'Masuk ke Dashboard';
            }
        });
    </script>
</body>
</html>
